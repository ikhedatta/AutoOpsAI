# Target infrastructure stack — this is what AutoOps AI monitors.
# IMPORTANT: This is the DEMO target, NOT the AutoOps data store.
# Chaos scripts can safely kill these containers.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - demo-app
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  demo-app:
    build:
      context: ./demo-app
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGODB_HOST=mongodb-demo
      - MONGODB_PORT=27017
      - REDIS_HOST=demo-redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb-demo
      - demo-redis
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  mongodb-demo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-demo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  demo-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  mongo-demo-data:
