# ─────────────────────────────────────────────────────────
#  HTTPS Reverse Proxy for AutoOpsAI
#  Terminates TLS on port 443 and routes to backend services
#  running on the host via path-based routing.
# ─────────────────────────────────────────────────────────

# Rate limiting zone (protect against brute-force)
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

# ── Upstream definitions (host.docker.internal → host services) ──
upstream autoops_backend {
    server host.docker.internal:8088;
}

upstream grafana_backend {
    server host.docker.internal:3000;
}

upstream prometheus_backend {
    server host.docker.internal:9090;
}

upstream loki_backend {
    server host.docker.internal:3100;
}

# ── Redirect HTTP → HTTPS ──
server {
    listen 80;
    server_name 10.41.31.20;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ──
server {
    listen 443 ssl;
    server_name 10.41.31.20;

    # -- TLS settings --
    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # -- Security headers --
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -- Rate limiting --
    limit_req zone=general burst=50 nodelay;

    # -- Common proxy settings --
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ──────────────────────────────────────────────
    #  AutoOps AI  (frontend + API) → port 8088
    #  Serves: /, /api/*, /ws/*
    # ──────────────────────────────────────────────
    location / {
        proxy_pass http://autoops_backend;
    }

    # WebSocket support for AutoOps
    location /ws {
        proxy_pass http://autoops_backend;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ──────────────────────────────────────────────
    #  Grafana → port 3000
    #  Access via: https://10.41.31.20/grafana/
    # ──────────────────────────────────────────────
    location /grafana/ {
        proxy_pass http://grafana_backend/;
    }

    # Grafana WebSocket (live dashboards)
    location /grafana/api/live/ {
        proxy_pass http://grafana_backend/api/live/;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ──────────────────────────────────────────────
    #  Prometheus → port 9090
    #  Access via: https://10.41.31.20/prometheus/
    # ──────────────────────────────────────────────
    location /prometheus/ {
        proxy_pass http://prometheus_backend/prometheus/;
    }

    # ──────────────────────────────────────────────
    #  Loki → port 3100
    #  Access via: https://10.41.31.20/loki/
    # ──────────────────────────────────────────────
    location /loki/ {
        proxy_pass http://loki_backend/;
    }
}
