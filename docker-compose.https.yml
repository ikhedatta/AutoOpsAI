# HTTPS Reverse Proxy for AutoOpsAI
# Routes all services through a single HTTPS endpoint: https://10.41.31.20
#
# Usage:
#   docker compose -f docker-compose.https.yml up -d
#
# Endpoints after setup:
#   https://10.41.31.20/            → AutoOps AI (frontend + API)
#   https://10.41.31.20/grafana/    → Grafana
#   https://10.41.31.20/prometheus/ → Prometheus
#   https://10.41.31.20/loki/       → Loki

services:
  https-proxy:
    image: nginx:alpine
    container_name: autoops-https-proxy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./infra/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/ssl/selfsigned.crt:/etc/nginx/ssl/selfsigned.crt:ro
      - ./infra/ssl/selfsigned.key:/etc/nginx/ssl/selfsigned.key:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:443/"]
      interval: 30s
      timeout: 5s
      retries: 3
