# AutoOps AI agent services
# Connects to: existing MongoDB instance, existing Prometheus/Grafana

services:
  autoops-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://localhost:27017/autoops}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3:8b}
      - PROVIDER_TYPE=docker_compose
      - COMPOSE_PROJECT_NAME=autoops-demo
      - COMPOSE_FILE=/app/infra/docker-compose.target.yml
      - POLLING_INTERVAL_SECONDS=${POLLING_INTERVAL_SECONDS:-15}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - LOKI_URL=${LOKI_URL:-http://loki:3100}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./playbooks:/app/playbooks:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
